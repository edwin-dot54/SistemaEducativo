{% extends 'base.html' %}

{% block title %}{% if horario %}Editar{% else %}Nuevo{% endif %} Horario{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0">
                        <i class="bi bi-clock"></i> 
                        {% if horario %}Editar{% else %}Nuevo{% endif %} Horario
                    </h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="id_grado" class="form-label">Grado</label>
                                    <select name="id_grado" class="form-select" id="id_grado" required>
                                        <option value="">Seleccionar...</option>
                                        {% for grado in grados %}
                                        <option value="{{ grado.pk }}" {% if horario.id_grado_id == grado.pk %}selected{% endif %}>
                                            {{ grado.nombre_grado }}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="id_materia" class="form-label">Materia</label>
                                    <select name="id_materia" class="form-select" id="id_materia" required>
                                        <option value="">Seleccionar...</option>
                                        {% for materia in materias %}
                                        <option value="{{ materia.pk }}" {% if horario.id_materia_id == materia.pk %}selected{% endif %}>
                                            {{ materia.nombre_materia }}
                                        </option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_dia_semana" class="form-label">Día de la Semana</label>
                            <select name="dia_semana" class="form-select" id="id_dia_semana" required>
                                <option value="">Seleccionar...</option>
                                <option value="lunes" {% if horario.dia_semana == 'lunes' %}selected{% endif %}>Lunes</option>
                                <option value="martes" {% if horario.dia_semana == 'martes' %}selected{% endif %}>Martes</option>
                                <option value="miercoles" {% if horario.dia_semana == 'miercoles' %}selected{% endif %}>Miércoles</option>
                                <option value="jueves" {% if horario.dia_semana == 'jueves' %}selected{% endif %}>Jueves</option>
                                <option value="viernes" {% if horario.dia_semana == 'viernes' %}selected{% endif %}>Viernes</option>
                                <option value="sabado" {% if horario.dia_semana == 'sabado' %}selected{% endif %}>Sábado</option>
                            </select>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="id_hora_inicio" class="form-label">Hora de Inicio</label>
                                    <input type="time" 
                                           name="hora_inicio" 
                                           class="form-control" 
                                           id="id_hora_inicio" 
                                           value="{{ horario.hora_inicio|default:'' }}"
                                           required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="id_hora_fin" class="form-label">Hora de Fin</label>
                                    <input type="time" 
                                           name="hora_fin" 
                                           class="form-control" 
                                           id="id_hora_fin" 
                                           value="{{ horario.hora_fin|default:'' }}"
                                           required>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_aula" class="form-label">Aula</label>
                            <input type="text" 
                                   name="aula" 
                                   class="form-control" 
                                   id="id_aula" 
                                   value="{{ horario.aula|default:'' }}"
                                   placeholder="Ej: 101">
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Guardar
                            </button>
                            <a href="{% url 'horario_list' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
