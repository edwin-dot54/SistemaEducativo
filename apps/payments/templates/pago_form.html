{% extends 'base.html' %}

{% block title %}{% if pago %}Editar{% else %}Nuevo{% endif %} Pago{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0">
                        <i class="bi bi-cash-stack"></i> 
                        {% if pago %}Editar{% else %}Nuevo{% endif %} Pago
                    </h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="id_estudiante" class="form-label">Estudiante</label>
                            <select name="id_estudiante" class="form-select" id="id_estudiante" required>
                                <option value="">Seleccionar...</option>
                                {% for estudiante in estudiantes %}
                                <option value="{{ estudiante.pk }}" {% if pago.id_estudiante_id == estudiante.pk %}selected{% endif %}>
                                    {{ estudiante.nombre }} {{ estudiante.apellido }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_concepto" class="form-label">Concepto</label>
                            <select name="concepto" class="form-select" id="id_concepto" required>
                                <option value="">Seleccionar...</option>
                                <option value="matricula" {% if pago.concepto == 'matricula' %}selected{% endif %}>Matrícula</option>
                                <option value="pension" {% if pago.concepto == 'pension' %}selected{% endif %}>Pensión</option>
                                <option value="materiales" {% if pago.concepto == 'materiales' %}selected{% endif %}>Materiales</option>
                                <option value="otro" {% if pago.concepto == 'otro' %}selected{% endif %}>Otro</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_monto" class="form-label">Monto</label>
                            <input type="number" 
                                   name="monto" 
                                   class="form-control" 
                                   id="id_monto" 
                                   value="{{ pago.monto|default:'' }}"
                                   min="0" 
                                   step="0.01"
                                   required>
                        </div>
                        
                        {% if pago %}
                        <div class="mb-3">
                            <label for="id_estado" class="form-label">Estado</label>
                            <select name="estado" class="form-select" id="id_estado" required>
                                <option value="pagado" {% if pago.estado == 'pagado' %}selected{% endif %}>Pagado</option>
                                <option value="pendiente" {% if pago.estado == 'pendiente' %}selected{% endif %}>Pendiente</option>
                                <option value="atrasado" {% if pago.estado == 'atrasado' %}selected{% endif %}>Atrasado</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_fecha_pago" class="form-label">Fecha de Pago</label>
                            <input type="date" 
                                   name="fecha_pago" 
                                   class="form-control" 
                                   id="id_fecha_pago" 
                                   value="{{ pago.fecha_pago|default:'' }}">
                        </div>
                        
                        <div class="mb-3">
                            <label for="id_metodo_pago" class="form-label">Método de Pago</label>
                            <select name="metodo_pago" class="form-select" id="id_metodo_pago">
                                <option value="">Seleccionar...</option>
                                <option value="efectivo" {% if pago.metodo_pago == 'efectivo' %}selected{% endif %}>Efectivo</option>
                                <option value="transferencia" {% if pago.metodo_pago == 'transferencia' %}selected{% endif %}>Transferencia</option>
                                <option value="tarjeta" {% if pago.metodo_pago == 'tarjeta' %}selected{% endif %}>Tarjeta</option>
                            </select>
                        </div>
                        {% endif %}
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Guardar
                            </button>
                            <a href="{% url 'pago_list' %}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
