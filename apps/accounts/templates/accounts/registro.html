<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 520px;
            width: 100%;
        }
        .register-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .register-body {
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="register-card">
                    <div class="register-header">
                        <i class="bi bi-person-plus brand-icon" style="font-size: 3rem;"></i>
                        <h3 class="mb-1">Crear cuenta</h3>
                        <p class="mb-0 opacity-75">Llena los datos para registrarte</p>
                    </div>

                    <div class="register-body">
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                </div>
                            {% endfor %}
                        {% endif %}

                        <form method="post">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label for="id_username" class="form-label">Usuario</label>
                                <input type="text" name="username" id="id_username" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label for="id_password" class="form-label">Contraseña</label>
                                <input type="password" name="password" id="id_password" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label for="id_confirm_password" class="form-label">Confirmar contraseña</label>
                                <input type="password" name="confirm_password" id="id_confirm_password" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label for="id_telefono" class="form-label">Teléfono (opcional)</label>
                                <input type="text" name="telefono" id="id_telefono" class="form-control">
                            </div>

                            <div class="mb-3">
                                <label for="id_id_rol" class="form-label">Rol</label>
                                <select name="id_rol" id="id_id_rol" class="form-select">
                                    <option value="">Sin rol</option>
                                    {% for r in roles %}
                                        <option value="{{ r.id }}">{{ r.nombre_rol }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="bi bi-check2-circle"></i> Registrarme
                                </button>
                                <a href="{% url 'login' %}" class="btn btn-outline-secondary">
                                    <i class="bi bi-box-arrow-left"></i> Volver al login
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
